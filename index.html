<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý văn bản Đảng</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f8f1f1;
      color: #2b2b2b;
    }

    .header {
      background: linear-gradient(135deg, #8b0000, #c62828);
      color: white;
      padding: 22px 16px;
      text-align: center;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .container {
      max-width: 720px;
      margin: 18px auto;
      padding: 14px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-top: 5px solid #b71c1c;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #7f0000;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d6bcbc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      background: #fffafa;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #b71c1c;
      box-shadow: 0 0 0 2px rgba(183,28,28,0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cap-so-box {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 10px;
      align-items: end;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #b71c1c, #d32f2f);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-small {
      margin-top: 0;
      height: 46px;
      padding: 10px;
      font-size: 14px;
      background: linear-gradient(135deg, #8b0000, #b71c1c);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .readonly {
      background: #f1eeee;
      font-weight: bold;
      color: #7f0000;
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      text-align: center;
    }

    .success {
      display: block;
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }

    .error {
      display: block;
      background: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      .row,
      .cap-so-box {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>QUẢN LÝ VĂN BẢN ĐẢNG</h1>
    <p>Đăng ký văn bản đi</p>
  </div>

  <div class="container">
    <div class="card">

      <form id="vanBanForm">

        <div class="row">
          <div>
            <label>Năm</label>
            <input type="number" id="namVanBan" value="2026" required>
          </div>

          <div>
            <label>Ký hiệu</label>
            <select id="kyHieu" required>
              <option value="/CV-ĐU">/CV-ĐU</option>
              <option value="/QĐ-ĐU">/QĐ-ĐU</option>
              <option value="/KH-ĐU">/KH-ĐU</option>
              <option value="/TB-ĐU">/TB-ĐU</option>
              <option value="/GM-ĐU">/GM-ĐU</option>
            </select>
          </div>
        </div>

        <label>Số văn bản</label>
        <div class="cap-so-box">
          <input type="number" id="soVanBan" class="readonly" readonly placeholder="Bấm cấp số">
          <button type="button" class="btn-small" id="capSoBtn">Cấp số</button>
        </div>

        <label>Số và ký hiệu văn bản</label>
        <input type="text" id="soVaKyHieu" class="readonly" readonly placeholder="Ví dụ: 45/CV-ĐU" required>

        <label>Ngày tháng năm văn bản</label>
        <input type="date" id="ngayVanBan" required>

        <label>Tên loại và trích yếu nội dung văn bản</label>
        <textarea id="trichYeu" placeholder="Nhập trích yếu nội dung văn bản..." required></textarea>

        <label>Người ký</label>
        <input type="text" id="nguoiKy" placeholder="Ví dụ: Nguyễn Văn A">

        <div class="row">
          <div>
            <label>Số trang</label>
            <input type="number" id="soTrang" min="1" placeholder="Ví dụ: 2">
          </div>

          <div>
            <label>Số bản</label>
            <input type="number" id="soBan" min="1" placeholder="Ví dụ: 1">
          </div>
        </div>

        <label>Đơn vị/cá nhân nhận bản lưu</label>
        <input type="text" id="donViNhanBanLuu" placeholder="Ví dụ: Văn phòng Đảng ủy">

        <label>Nơi nhận văn bản</label>
        <textarea id="noiNhanVanBan" placeholder="Nhập nơi nhận văn bản..."></textarea>

        <label>Lưu hồ sơ số</label>
        <input type="text" id="luuHoSoSo" placeholder="Ví dụ: HS-2026-01">

        <label>Ghi chú</label>
        <textarea id="ghiChu" placeholder="Ghi chú thêm nếu có..."></textarea>

        <button type="submit" id="submitBtn">Lưu văn bản</button>

        <div id="message" class="message"></div>

      </form>

    </div>

    <div class="footer">
      Phần mềm quản lý văn bản Đảng
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwazhWwdWiojwjLLR_V93HzURX1QIry1Przv8l-9WgsbJY7SgD63ruAL98UdUj4HdKW/exec';

    const form = document.getElementById('vanBanForm');
    const messageBox = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const capSoBtn = document.getElementById('capSoBtn');

    const soVanBanInput = document.getElementById('soVanBan');
    const kyHieuInput = document.getElementById('kyHieu');
    const soVaKyHieuInput = document.getElementById('soVaKyHieu');

    document.getElementById('ngayVanBan').valueAsDate = new Date();

    kyHieuInput.addEventListener('change', capNhatSoVaKyHieu);

    capSoBtn.addEventListener('click', async function() {
      capSoBtn.disabled = true;
      capSoBtn.innerText = 'Đang cấp...';

      const nam = document.getElementById('namVanBan').value;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: 'CAP_SO_VAN_BAN_DI',
            nam: nam
          })
        });

        /*
          Do giới hạn no-cors của Google Apps Script, trình duyệt không đọc trực tiếp được số trả về.
          Vì vậy sau khi cấp số, anh kiểm tra trong sheet SỔ VĂN BẢN hoặc em sẽ chỉnh tiếp bằng JSONP để hiện số ngay trên giao diện.
        */

        showMessage('Đã gửi yêu cầu cấp số. Vui lòng kiểm tra sheet SỔ VĂN BẢN.', 'success');

      } catch (error) {
        showMessage('Không cấp được số. Vui lòng kiểm tra Apps Script.', 'error');
      }

      capSoBtn.disabled = false;
      capSoBtn.innerText = 'Cấp số';
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      if (!soVaKyHieuInput.value.trim()) {
        showMessage('Vui lòng cấp số văn bản trước khi lưu.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Đang lưu...';

      const data = {
        action: 'LUU_VAN_BAN_DI',
        soVanBan: soVanBanInput.value,
        kyHieu: kyHieuInput.value,
        soVaKyHieu: soVaKyHieuInput.value,
        ngayVanBan: document.getElementById('ngayVanBan').value,
        trichYeu: document.getElementById('trichYeu').value.trim(),
        nguoiKy: document.getElementById('nguoiKy').value.trim(),
        soTrang: document.getElementById('soTrang').value,
        soBan: document.getElementById('soBan').value,
        donViNhanBanLuu: document.getElementById('donViNhanBanLuu').value.trim(),
        noiNhanVanBan: document.getElementById('noiNhanVanBan').value.trim(),
        luuHoSoSo: document.getElementById('luuHoSoSo').value.trim(),
        ghiChu: document.getElementById('ghiChu').value.trim()
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(data)
        });

        showMessage('Đã lưu văn bản thành công.', 'success');
        form.reset();
        document.getElementById('namVanBan').value = new Date().getFullYear();
        document.getElementById('ngayVanBan').valueAsDate = new Date();

      } catch (error) {
        showMessage('Không lưu được dữ liệu. Vui lòng kiểm tra Web App.', 'error');
      }

      submitBtn.disabled = false;
      submitBtn.innerText = 'Lưu văn bản';
    });

    function capNhatSoVaKyHieu() {
      const soVanBan = soVanBanInput.value;
      const kyHieu = kyHieuInput.value;

      if (soVanBan && kyHieu) {
        soVaKyHieuInput.value = soVanBan + kyHieu;
      } else {
        soVaKyHieuInput.value = '';
      }
    }

    function showMessage(text, type) {
      messageBox.innerText = text;
      messageBox.className = 'message ' + type;
    }
  </script>

</body>
</html>
