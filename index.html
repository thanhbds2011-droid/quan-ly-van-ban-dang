<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý văn bản Đảng</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f8f1f1;
      color: #2b2b2b;
    }

    .header {
      background: linear-gradient(135deg, #8b0000, #c62828);
      color: white;
      padding: 22px 16px;
      text-align: center;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .container {
      max-width: 900px;
      margin: 18px auto;
      padding: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab-btn {
      margin-top: 0;
      background: #fff;
      color: #8b0000;
      border: 1px solid #d6bcbc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #8b0000, #c62828);
      color: #fff;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-top: 5px solid #b71c1c;
      margin-bottom: 16px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #7f0000;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d6bcbc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      background: #fffafa;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #b71c1c;
      box-shadow: 0 0 0 2px rgba(183,28,28,0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .cap-so-box {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 10px;
      align-items: end;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #b71c1c, #d32f2f);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-small {
      margin-top: 0;
      height: 46px;
      padding: 10px;
      font-size: 14px;
      background: linear-gradient(135deg, #8b0000, #b71c1c);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .readonly {
      background: #f1eeee;
      font-weight: bold;
      color: #7f0000;
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      text-align: center;
    }

    .success {
      display: block;
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }

    .error {
      display: block;
      background: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
      border: 1px solid #eee;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
      background: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #8b0000;
      color: white;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) {
      background: #fffafa;
    }

    .hidden {
      display: none;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      .row,
.row-3,
.cap-so-box,
.tabs {
  grid-template-columns: 1fr;
}

      .header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>QUẢN LÝ VĂN BẢN ĐẢNG</h1>
    <p>Đăng ký văn bản đi và tra cứu nhật ký</p>
  </div>

  <div class="container">

    <div class="tabs">
      <button type="button" class="tab-btn active" id="tabDangKy">📄 Đăng ký văn bản đi</button>
      <button type="button" class="tab-btn" id="tabNhatKy">🔎 Tra cứu nhật ký</button>
    </div>

    <div id="dangKySection" class="card">
      <form id="vanBanForm">

        <div class="row">
          <div>
            <label>Năm</label>
            <input type="number" id="namVanBan" value="2026" required>
          </div>

          <div>
            <label>Ký hiệu</label>
            <select id="kyHieu" required>
              <option value="/CV-ĐU">/CV-ĐU</option>
              <option value="/QĐ-ĐU">/QĐ-ĐU</option>
              <option value="/KH-ĐU">/KH-ĐU</option>
              <option value="/TB-ĐU">/TB-ĐU</option>
              <option value="/GM-ĐU">/GM-ĐU</option>
            </select>
          </div>
        </div>

        <label>Số văn bản</label>
        <div class="cap-so-box">
          <input type="number" id="soVanBan" class="readonly" readonly placeholder="Bấm cấp số">
          <button type="button" class="btn-small" id="capSoBtn">Cấp số</button>
        </div>

        <label>Số và ký hiệu văn bản</label>
        <input type="text" id="soVaKyHieu" class="readonly" readonly placeholder="Ví dụ: 45/CV-ĐU" required>

        <label>Ngày tháng năm văn bản</label>
        <input type="date" id="ngayVanBan" required>

        <label>Tên loại và trích yếu nội dung văn bản</label>
        <textarea id="trichYeu" placeholder="Nhập trích yếu nội dung văn bản..." required></textarea>

        <label>Người ký</label>
        <input type="text" id="nguoiKy" placeholder="Ví dụ: Nguyễn Văn A">

        <div class="row">
          <div>
            <label>Số trang</label>
            <input type="number" id="soTrang" min="1" placeholder="Ví dụ: 2">
          </div>

          <div>
            <label>Số bản</label>
            <input type="number" id="soBan" min="1" placeholder="Ví dụ: 1">
          </div>
        </div>

        <label>Đơn vị/cá nhân nhận bản lưu</label>
        <input type="text" id="donViNhanBanLuu" placeholder="Ví dụ: Văn phòng Đảng ủy">

        <label>Nơi nhận văn bản</label>
        <textarea id="noiNhanVanBan" placeholder="Nhập nơi nhận văn bản..."></textarea>

        <label>Lưu hồ sơ số</label>
        <input type="text" id="luuHoSoSo" placeholder="Ví dụ: HS-2026-01">

        <label>Ghi chú</label>
        <textarea id="ghiChu" placeholder="Ghi chú thêm nếu có..."></textarea>

        <button type="submit" id="submitBtn">Lưu văn bản</button>

        <div id="message" class="message"></div>

      </form>
    </div>

    <div id="nhatKySection" class="card hidden">
      <h3 style="margin-top:0;color:#8b0000;">🔎 Tra cứu nhật ký</h3>

      <div class="row-3">
        <div>
          <label>Từ ngày</label>
          <input type="date" id="tuNgay">
        </div>

        <div>
          <label>Đến ngày</label>
          <input type="date" id="denNgay">
        </div>

        <div>
          <label>Năm</label>
          <input type="number" id="filterNam" placeholder="Ví dụ: 2026">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Trạng thái</label>
          <select id="filterTrangThai">
            <option value="">Tất cả</option>
            <option value="Đã cấp số">Đã cấp số</option>
            <option value="Đã đăng ký">Đã đăng ký</option>
            <option value="Đã hủy">Đã hủy</option>
          </select>
        </div>

        <div>
          <label>Từ khóa</label>
          <input type="text" id="filterTuKhoa" placeholder="Nhập số, ký hiệu, trích yếu, lý do...">
        </div>
      </div>

      <button type="button" id="traCuuBtn">Tra cứu</button>

      <div id="messageNhatKy" class="message"></div>


      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Trạng thái</th>
              <th>Loại sổ</th>
              <th>Năm</th>
              <th>Số và ký hiệu</th>
              <th>Trích yếu</th>
              <th>Lý do</th>
            </tr>
          </thead>
          <tbody id="nhatKyBody">
            <tr>
              <td colspan="7">Chưa tra cứu dữ liệu.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      Phần mềm quản lý văn bản Đảng
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwazhWwdWiojwjLLR_V93HzURX1QIry1Przv8l-9WgsbJY7SgD63ruAL98UdUj4HdKW/exec';

    const form = document.getElementById('vanBanForm');
    const messageBox = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const capSoBtn = document.getElementById('capSoBtn');

    const namInput = document.getElementById('namVanBan');
    const soVanBanInput = document.getElementById('soVanBan');
    const kyHieuInput = document.getElementById('kyHieu');
    const soVaKyHieuInput = document.getElementById('soVaKyHieu');
    const ngayVanBanInput = document.getElementById('ngayVanBan');

    const tabDangKy = document.getElementById('tabDangKy');
    const tabNhatKy = document.getElementById('tabNhatKy');
    const dangKySection = document.getElementById('dangKySection');
    const nhatKySection = document.getElementById('nhatKySection');

    ngayVanBanInput.valueAsDate = new Date();
    namInput.value = new Date().getFullYear();

    tabDangKy.addEventListener('click', function() {
      dangKySection.classList.remove('hidden');
      nhatKySection.classList.add('hidden');
      tabDangKy.classList.add('active');
      tabNhatKy.classList.remove('active');
    });

    tabNhatKy.addEventListener('click', function() {
      dangKySection.classList.add('hidden');
      nhatKySection.classList.remove('hidden');
      tabDangKy.classList.remove('active');
      tabNhatKy.classList.add('active');
    });

    kyHieuInput.addEventListener('change', capNhatSoVaKyHieu);

    capSoBtn.addEventListener('click', function() {
      const nam = namInput.value.trim();
      const kyHieu = kyHieuInput.value;

      if (!nam) {
        showMessage('Vui lòng nhập năm trước khi cấp số.', 'error');
        return;
      }

      capSoBtn.disabled = true;
      capSoBtn.innerText = 'Đang cấp...';

      jsonpRequest({
        action: 'CAP_SO_VAN_BAN_DI',
        nam: nam,
        kyHieu: kyHieu
      }, function(result) {
        if (result.success) {
          soVanBanInput.value = result.soVanBan;
          soVaKyHieuInput.value = result.soVaKyHieu || (result.soVanBan + kyHieu);

          showMessage('Đã cấp số văn bản: ' + soVaKyHieuInput.value, 'success');

          capSoBtn.disabled = true;
          capSoBtn.innerText = 'Đã cấp';
        } else {
          showMessage(result.message || 'Không cấp được số.', 'error');
          capSoBtn.disabled = false;
          capSoBtn.innerText = 'Cấp số';
        }
      }, function() {
        showMessage('Không kết nối được Apps Script.', 'error');
        capSoBtn.disabled = false;
        capSoBtn.innerText = 'Cấp số';
      });
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      if (!soVanBanInput.value || !soVaKyHieuInput.value) {
        showMessage('Vui lòng bấm Cấp số trước khi lưu.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Đang lưu...';

      const data = {
        action: 'LUU_VAN_BAN_DI',
        nam: namInput.value,
        soVanBan: soVanBanInput.value,
        kyHieu: kyHieuInput.value,
        soVaKyHieu: soVaKyHieuInput.value,
        ngayVanBan: ngayVanBanInput.value,
        trichYeu: document.getElementById('trichYeu').value.trim(),
        nguoiKy: document.getElementById('nguoiKy').value.trim(),
        soTrang: document.getElementById('soTrang').value,
        soBan: document.getElementById('soBan').value,
        donViNhanBanLuu: document.getElementById('donViNhanBanLuu').value.trim(),
        noiNhanVanBan: document.getElementById('noiNhanVanBan').value.trim(),
        luuHoSoSo: document.getElementById('luuHoSoSo').value.trim(),
        ghiChu: document.getElementById('ghiChu').value.trim()
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(data)
        });

        showMessage('Đã lưu văn bản thành công.', 'success');

        form.reset();
        namInput.value = new Date().getFullYear();
        ngayVanBanInput.valueAsDate = new Date();

        soVanBanInput.value = '';
        soVaKyHieuInput.value = '';

        capSoBtn.disabled = false;
        capSoBtn.innerText = 'Cấp số';

      } catch (error) {
        showMessage('Không lưu được dữ liệu. Vui lòng kiểm tra Web App.', 'error');
      }

      submitBtn.disabled = false;
      submitBtn.innerText = 'Lưu văn bản';
    });

    document.getElementById('traCuuBtn').addEventListener('click', function() {
      traCuuNhatKy();
    });

    function traCuuNhatKy() {
      const traCuuBtn = document.getElementById('traCuuBtn');
      traCuuBtn.disabled = true;
      traCuuBtn.innerText = 'Đang tra cứu...';

      const params = {
        action: 'TRA_CUU_NHAT_KY',
        tuNgay: document.getElementById('tuNgay').value,
        denNgay: document.getElementById('denNgay').value,
        nam: document.getElementById('filterNam').value,
        trangThai: document.getElementById('filterTrangThai').value,
        tuKhoa: document.getElementById('filterTuKhoa').value.trim()
      };

      jsonpRequest(params, function(result) {
        if (result.success) {
          renderNhatKy(result.data || []);
          showMessageNhatKy('Tra cứu thành công: ' + (result.data || []).length + ' dòng.', 'success');
        } else {
          showMessageNhatKy(result.message || 'Không tra cứu được dữ liệu.', 'error');
        }

        traCuuBtn.disabled = false;
        traCuuBtn.innerText = 'Tra cứu';

      }, function() {
        showMessageNhatKy('Không kết nối được Apps Script.', 'error');
        traCuuBtn.disabled = false;
        traCuuBtn.innerText = 'Tra cứu';
      });
    }

    function renderNhatKy(data) {
      const body = document.getElementById('nhatKyBody');
      body.innerHTML = '';

      if (!data.length) {
        body.innerHTML = '<tr><td colspan="7">Không có dữ liệu phù hợp.</td></tr>';
        return;
      }

      data.forEach(item => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${escapeHtml(item.thoiGian)}</td>
          <td>${escapeHtml(item.trangThai)}</td>
          <td>${escapeHtml(item.loaiSo)}</td>
          <td>${escapeHtml(item.nam)}</td>
          <td><strong>${escapeHtml(item.soVaKyHieu)}</strong></td>
          <td>${escapeHtml(item.trichYeu)}</td>
          <td>${escapeHtml(item.lyDo)}</td>
        `;

        body.appendChild(tr);
      });
    }

    function capNhatSoVaKyHieu() {
      const soVanBan = soVanBanInput.value;
      const kyHieu = kyHieuInput.value;

      if (soVanBan && kyHieu) {
        soVaKyHieuInput.value = soVanBan + kyHieu;
      } else {
        soVaKyHieuInput.value = '';
      }
    }

    function jsonpRequest(params, onSuccess, onError) {
      const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

      params.callback = callbackName;

      const query = Object.keys(params)
        .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key] || ''))
        .join('&');

      const script = document.createElement('script');

      window[callbackName] = function(result) {
        try {
          onSuccess(result);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      script.onerror = function() {
        delete window[callbackName];
        script.remove();
        if (onError) onError();
      };

      script.src = API_URL + '?' + query;
      document.body.appendChild(script);
    }

    function showMessage(text, type) {
      messageBox.innerText = text;
      messageBox.className = 'message ' + type;
    }

    function showMessageNhatKy(text, type) {
      const box = document.getElementById('messageNhatKy');
      box.innerText = text;
      box.className = 'message ' + type;
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return '';

      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>

</body>
</html>
